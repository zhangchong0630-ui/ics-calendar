name: Update World Cup results

on:
  workflow_dispatch:
  schedule:
    - cron: "12 * * * *"

permissions:
  contents: write

concurrency:
  group: update-worldcup-results
  cancel-in-progress: false

jobs:
  update-results:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update World Cup ICS
        run: python3 scripts/update_worldcup_scores.py

      - name: Commit updated ICS
        run: |
          if git diff --quiet -- worldcup2026_groupstage.ics; then
            echo "No ICS changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add worldcup2026_groupstage.ics
          git commit -m "Update World Cup ICS results"
          git push
